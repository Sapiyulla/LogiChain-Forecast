dirty_data:
  enabled: true
  gap_probability: 0.002 # Пропуск записи (строка не создаётся)
  null_probability: 0.001 # NULL в occupied_pallets
  negative_probability: 0.0005 # Отрицательное значение
  over_capacity_probability: 0.001 # Превышение ёмкости
  duplicate_probability: 0.0005 # Дубликат строки
  drift_probability: 0.0002 # Дрейф показаний (не отдельная запись, а искажение в серии)

noise:
  white_noise_std: 0.02 # Стандартное отклонение белого шума (доля от текущего значения)

output:
  type: "database" # "file" или "database"
  # Если type = file
  # path: "./raw_warehouse_occupancy.csv"
  # Если type = database
  uri: "postgresql://postgres:postgres@localhost:5432/warehouse"
  table: "raw_warehouse_occupancy"
  schema: "bronze"
